events {
    worker_connections 4096; # Increased for high concurrency
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # --- Performance Tuning ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M; # Allow larger uploads

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # --- Security Headers (Hardened) ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Hide Nginx Version
    server_tokens off;

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        # Apex + all section subdomains (tools./blog./projects./jobs./login./
        # status.). Host is forwarded to the frontend so proxy.ts can apply the
        # Host-based rewrites. api. has its own server block below.
        server_name baghaei.com www.baghaei.com *.baghaei.com;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;

        # Live deploy status — served by nginx from a mounted file so it stays
        # available even while the frontend container is restarting mid-deploy.
        # The deploy script rewrites this file at each stage; the /status page
        # polls it. Falls back to the frontend (baked-in idle copy) if absent.
        location = /deploy-status.json {
            alias /var/www/status/deploy-status.json;
            add_header Cache-Control "no-store" always;
            default_type application/json;
            try_files /deploy-status.json @frontend_status;
        }
        location @frontend_status {
            proxy_pass http://frontend/deploy-status.json;
            proxy_set_header Host $host;
        }

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # Required for Keep-Alive
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Rate Limiting is handled by Backend (NestJS + Redis), but we can add Nginx layer if needed
        }
        
        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }

    # api.baghaei.com → backend (Cloudflare terminates TLS, forwards to origin :80)
    server {
        listen 80;
        server_name api.baghaei.com;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # Required for Keep-Alive
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
