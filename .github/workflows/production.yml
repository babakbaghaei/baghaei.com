name: Production CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          backend/package-lock.json
          frontend/package-lock.json
    
    - name: Install Root Dependencies
      run: npm ci
      
    - name: Backend Lint
      run: cd backend && npm ci --legacy-peer-deps && npm run lint
      
    - name: Frontend Lint
      run: cd frontend && npm ci && npm run lint

  backend-testing:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
        
    - name: Install Dependencies
      run: cd backend && npm ci --legacy-peer-deps
      
    - name: Generate Prisma Client
      run: cd backend && npx prisma generate
      env:
        DATABASE_URL: "file:./test.db"
        
    - name: Run Tests
      run: cd backend && npm test
      env:
        DATABASE_URL: "file:./test.db"
        JWT_SECRET: "ci-test-secret-key-at-least-32-characters"

  frontend-testing:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: cd frontend && npm ci

    - name: Install Playwright Browsers
      run: cd frontend && npx playwright install --with-deps

    - name: Run E2E Tests
      run: cd frontend && npm test
      env:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"

  lighthouse:
    name: Lighthouse & A11y Audit (report-only)
    runs-on: ubuntu-latest
    # Report-only: never blocks the pipeline or deploy. Lighthouse's accessibility
    # category runs axe-core rules, so this covers perf + a11y + SEO + best-practices.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build
      - name: Run Lighthouse CI
        run: cd frontend && npx --yes @lhci/cli@0.14.x autorun || true

  build-and-push:
    name: Build & Push Images to GHCR
    needs: [quality-assurance, backend-testing, frontend-testing]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build on CI's ample RAM (vs the 1GB VPS that swapped for ~1h) and push
      # to GHCR with registry-backed layer cache, so the VPS only needs to pull.
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/babakbaghaei/baghaei-backend:latest
            ghcr.io/babakbaghaei/baghaei-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/babakbaghaei/baghaei-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/babakbaghaei/baghaei-backend:buildcache,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # NEXT_PUBLIC_API_URL is baked into the browser bundle at build time,
          # so it must be supplied here (a restart on the VPS cannot change it).
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.baghaei.com
          tags: |
            ghcr.io/babakbaghaei/baghaei-frontend:latest
            ghcr.io/babakbaghaei/baghaei-frontend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/babakbaghaei/baghaei-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/babakbaghaei/baghaei-frontend:buildcache,mode=max

  deploy:
    name: Deploy to Server
    needs: [build-and-push]
    runs-on: ubuntu-latest
    # Disabled: deployment is handled by a server-side systemd timer that polls
    # git every minute and PULLS the images CI just pushed (see
    # deploy/auto-deploy.sh). Kept here, wired to build-and-push, so it can be
    # flipped on (if: github.ref == 'refs/heads/main') once SSH secrets exist.
    if: false
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/baghaei.com
            REPO_DIR=/var/www/baghaei.com ./deploy/auto-deploy.sh
